services:
  - type: web
    name: narpisa-pdf-worker
    runtime: docker
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: PDF_WORKER_PORT
        value: "8000"
      - key: PDF_WORKER_LOG_LEVEL
        value: INFO
      - key: PDF_WORKER_FETCH_TIMEOUT_SECONDS
        value: "20"
      - key: PDF_WORKER_FETCH_MAX_BYTES
        value: "10485760"
      - key: PDF_WORKER_FETCH_ALLOWED_DOMAINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SCHEMA
        value: public
